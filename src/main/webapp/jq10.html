<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	div {
		width: 100px; height:100px;
		background-color: orange;
		position : relative;
	}
</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script src="https://code.jquery.com/ui/1.14.2/jquery-ui.js"></script>
<script>
	// 플러그인 없이 사용할 때는 linear, swing
	let eases = [
		'linear', 'swing',
		'easeInQuad', 'easeOutQuad', 'easeInOutQuad',
		'easeInCubic', 'easeOutQuart', 'easeInOutQuint', 'etc',
		'easeInExpo', 'easeOutCirc', 'easeOutBounce', 'easeInBack',
		'easeOutBack', 'easeInElastic'
	]
	$( function() {
		let tag = '';
		$.each(eases, function(index, opt) {
			console.dir(opt);
			tag += `<option>${opt}</option>`
		})
		$('select').html(tag)
		$('button').click(function() {
			let easing = $('option:selected').html()
			$('div').animate({
				left : '400'
			}, 2000, easing)
			.animate({
				left : '0'
			}, 1000, easing)
		})
	})
</script>
</head>
<body>
   <select></select>
   <button>MOVE</button>
   <div></div>
</body>
</html>
