<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Insert title here</title>
<style>
	img { 
		width: 200px; 
		height : 200px;  
		position : relative;
		}
</style>
<script src="https://code.jquery.com/jquery.min.js"></script>
<script>
	$( function() {
		$('img').animate({ left : '+=100'}, 1000);
		$('img').animate({ width : '+=100'}, 1000);
		$('img').animate({ height : '+=100'}, 1000);
		
		// 7초 후에 사라짐
		setTimeout(function() {
			// 애니메이션 큐를 제거한다
			$('img').clearQueue();
			$('img').hide();
		}, 5000)
	})
</script>
</head>
<body>
	<img src="img/Koala.jpg" />
</body>
</html>
